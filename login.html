<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWARUP PREMIUM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #040916;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
        }
        .main-card {
            background: #0d1830;
            width: 350px;
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            text-align: center;
        }
        .title { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 12px; color: #00d4ff; letter-spacing: 2px; margin-bottom: 25px; }
        .input-box {
            background: #040916;
            border: 1px solid #00d4ff;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .btn-login {
            background: linear-gradient(90deg, #007bff, #00d4ff);
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .save-login {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .switch { width: 40px; height: 20px; background: #00d4ff; border-radius: 20px; position: relative; }
        .switch::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 1px; left: 19px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="title">SWARUP <span style="color: #00d4ff;">PREMIUM STORE</span></div>
    <div class="subtitle">THE PREMIUM ARENA</div>

    <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">USERNAME</div>
    <input type="text" id="user" class="input-box" placeholder="SWARUP PREMIUM STORE">

    <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">PASSWORD</div>
    <input type="password" id="pass" class="input-box" placeholder="••••">

    <div class="save-login">
        <span>Save Login</span>
        <div class="switch"></div>
    </div>

    <button class="btn-login" onclick="login()">LOGIN TO STORE</button>
</div>

<script>
    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        
        // Login check
        if(u === "SWARUP PREMIUM STORE" && p === "2006") {
            // Success hole dashboard.html e pathabe
            window.location.href = "dashboard.html";
        } else {
            alert("Wrong Username or Password!");
        }
    }
</script>

</body>
</html>
