<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWARUP PREMIUM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #040916;
            --card-bg: rgba(13, 24, 48, 0.7);
            --accent-blue: #00d4ff;
        }

        body { 
            background: radial-gradient(circle at center, #0a192f 0%, #040916 100%);
            margin: 0; padding: 20px; 
            font-family: 'Outfit', sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { text-align: center; margin: 40px 0; }
        .title { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
        .title span { color: var(--accent-blue); }

        .container { 
            width: 100%; max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .cat-title { font-size: 14px; color: var(--accent-blue); margin-bottom: 25px; letter-spacing: 3px; text-align: center; }

        .btn-cat { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 25px; margin-bottom: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; text-decoration: none; color: white;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .icon-box { font-size: 24px; margin-right: 15px; }

        /* Unique Hover Colors */
        .btn-music:hover { background: #ff4757; border-color: #ff4757; transform: translateY(-5px); }
        .btn-movie:hover { background: #ffa502; border-color: #ffa502; transform: translateY(-5px); }
        .btn-games:hover { background: #2ed573; border-color: #2ed573; transform: translateY(-5px); }
        .btn-edit:hover { background: #1e90ff; border-color: #1e90ff; transform: translateY(-5px); }

        .cancel-btn { 
            text-align: center; margin-top: 30px; color: #555; 
            font-size: 12px; text-transform: uppercase; cursor: pointer;
        }

        .footer { margin-top: auto; padding: 20px; color: #333; font-size: 11px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">SWARUP <span>STORE</span></div>
</div>

<div class="container">
    <div class="cat-title">SELECT YOUR CATEGORY</div>
    
    <a href="music.html" class="btn-cat btn-music">
        <div><span class="icon-box">🎵</span> MUSIC</div> <span>→</span>
    </a>
    
    <a href="movie.html" class="btn-cat btn-movie">
        <div><span class="icon-box">🎬</span> MOVIES</div> <span>→</span>
    </a>
    
    <a href="games.html" class="btn-cat btn-games">
        <div><span class="icon-box">🎮</span> GAMES</div> <span>→</span>
    </a>
    
    <a href="editing.html" class="btn-cat btn-edit">
        <div><span class="icon-box">🎨</span> EDITING</div> <span>→</span>
    </a>

    <div class="cancel-btn" onclick="window.location.href='dashboard.html'">Cancel Selection</div>
</div>

<div class="footer">
    &copy; 2026 SWARUP PREMIUM STORE V1.
</div>

</body>
</html>
