<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWARUP PREMIUM STORE | PicsArt</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent-blue: #00d4ff; }
        body { background: #040916; margin: 0; padding: 20px; font-family: 'Outfit', sans-serif; color: #fff; }

        .header { text-align: center; margin: 30px 0; }
        .title { font-size: 32px; font-weight: 800; }
        .title span { color: var(--accent-blue); }

        .app-card { 
            background: #0d1830; width: 100%; max-width: 450px; margin: 0 auto 30px;
            padding: 25px; border-radius: 30px; border: 1px solid #1a2a4a;
            transition: transform 0.4s ease; position: relative;
        }
        .app-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }

        /* App Icon */
        .app-icon { 
            width: 70px; height: 70px; background: #fff; border-radius: 18px;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .vip-badge { 
            background: #ffaa00; color: #000; padding: 5px 15px; border-radius: 10px;
            font-weight: 800; font-size: 12px; transform: rotate(-5deg);
            position: absolute; top: -10px; right: 10px;
        }

        .app-name { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .app-desc { color: #aaa; font-size: 13px; line-height: 1.6; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 15px; text-align: center; 
            font-weight: 600; text-decoration: none; color: white; transition: 0.3s;
        }
        .btn-down { background: #1e90ff; }
        .btn-setup { background: #ff4757; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        .footer { text-align: center; color: #333; font-size: 11px; margin-top: 50px; }
    </style>
</head>
