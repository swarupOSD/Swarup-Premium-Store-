    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #040916;
            margin: 0;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header Layout */
        .header { text-align: center; margin-bottom: 40px; }
        .title-wrapper { position: relative; display: inline-block; }
        .title { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: white; }
        .title span { color: #00d4ff; }
        .v1-badge {
            font-size: 10px; background: #00d4ff; color: #040916; 
            padding: 2px 6px; border-radius: 6px; font-weight: bold; 
            position: absolute; top: -10px; right: -25px;
        }
        .subtitle { font-size: 13px; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }

        /* Game Card */
        .game-card {
            background: #0d1830;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 25px;
            border: 1px solid #1a2a4a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .game-icon { width: 65px; height: 65px; border-radius: 15px; object-fit: cover; }
        .game-info { flex-grow: 1; }
        .game-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        
        .btn-select {
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* Footer */
        .footer { margin-top: auto; padding: 20px; color: #555; font-size: 12px; }
    </style>
</head>
