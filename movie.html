<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWARUP PREMIUM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #040916; 
            margin: 0; padding: 20px; 
            font-family: 'Outfit', sans-serif; 
            color: white; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }

        /* Header Style Match */
        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .title { font-size: 32px; font-weight: 800; color: white; position: relative; }
        .title span { color: #00d4ff; }
        .v10-badge { 
            font-size: 9px; background: #00d4ff; color: #040916; 
            padding: 2px 7px; border-radius: 6px; font-weight: bold; 
            position: absolute; top: -8px; right: -25px; 
        }
        .subtitle { font-size: 11px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* Maintenance Card */
        .maint-card { 
            background: rgba(255,255,255,0.03);
            width: 100%; max-width: 400px; 
            padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .status-badge { 
            background: #fff; color: #000; 
            padding: 5px 15px; border-radius: 20px; 
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 25px; display: inline-block;
        }
        
        /* Logo Styling */
        .dev-icon { 
            width: 80px; height: 80px; background: #161b22; 
            border-radius: 20px; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
        }
        
        h2 { font-size: 24px; margin-bottom: 15px; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-sub { 
            background: #fff; color: #000; padding: 15px; 
            border-radius: 15px; font-weight: 800; text-decoration: none;
            display: block; transition: 0.3s; margin-bottom: 15px;
        }
        .btn-sub:hover { background: #555; color: #fff; }
        
        .back-btn { color: #555; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { color: #fff; }

        .footer { margin-top: auto; padding: 20px; color: #333; font-size: 11px; text-align: center; }
    </style>
</head>
