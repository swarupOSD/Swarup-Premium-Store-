    <style>
        body { 
            background-color: #0d1117; 
            margin: 0; padding: 20px; 
            font-family: 'Poppins', sans-serif; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;

        /* Header */

        .title { font-size: 36px; font-weight: 800; color: white; position: relative; }
        .title span { color: #00d4ff; }

        }

        /* Development Card */
        .dev-card { 
            background: #161b22;

            max-width: 400px; 
            border-radius: 25px; 
            border: 1px solid #30363d; 
            overflow: hidden; 
            margin-bottom: auto; 
        }
        .dev-header { background: #ffaa00; color: black; text-align: center; padding: 10px; font-size: 13px; font-weight: bold; }
        .dev-content { padding: 30px; text-align: center; }
        .dev-icon { 
            width: 80px; height: 80px; background: #21262d; 
            border-radius: 15px; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-stay { 
            background: transparent; border: 1px solid #30363d; 
            color: #8b949e; padding: 12px 30px; border-radius: 12px; 
            font-size: 14px; margin-top: 20px; cursor: not-allowed;
        }

        /* Footer */
        .footer { padding: 20px; color: #484f58; font-size: 12px; text-align: center; }
    </style>
</head>
